<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Prescriptions | Elite EMR Patient Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { 'emr-teal': '#0d9488', 'emr-teal-dark': '#0f766e' }
        }
      }
    };
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="../css/emr-portal.css" rel="stylesheet">
  <link href="/css/sidebar-universal.css" rel="stylesheet">
</head>
<body class="emr-portal bg-slate-50 min-h-screen">
  <div class="admin-overlay fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity lg:hidden" id="adminOverlay" aria-hidden="true"></div>
  <div class="min-h-screen flex">
    <aside class="sidebar universal-sidebar-wrapper fixed inset-y-0 left-0 z-40 w-72 h-screen text-slate-100 flex flex-col border-r border-slate-800" style="background-color: #0f172a;">
      <div id="sidebar-container" class="flex flex-col flex-1 min-h-0"></div>
    </aside>
    <div class="flex-1 min-w-0 flex flex-col lg:ml-72">
  <header class="emr-header flex items-center justify-between gap-3 h-14 px-4 md:px-6">
    <button class="emr-drawer-toggle flex lg:hidden w-12 h-12 min-w-[48px] min-h-[48px] rounded-xl bg-slate-100 border border-slate-200 items-center justify-center text-slate-600 hover:bg-slate-200 active:scale-95 transition shrink-0" id="emrDrawerToggle" aria-label="Open menu">
      <i class="fas fa-bars"></i>
    </button>
    <div class="flex-1 min-w-0 relative max-w-md">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
      <input type="search" placeholder="Search prescriptions..." class="w-full py-2.5 pl-9 pr-4 rounded-xl border border-slate-200 bg-white/80 text-sm focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500 outline-none" aria-label="Search">
    </div>
    <div class="hidden md:flex items-center gap-3 ml-4">
      <div class="w-10 h-10 rounded-full bg-teal-600 flex items-center justify-center text-white font-semibold text-sm">RJ</div>
      <div>
        <p class="text-sm font-semibold text-slate-900">Robert Johnson</p>
        <p class="text-xs text-slate-500">Patient ID: RJ-20240524</p>
      </div>
    </div>
  </header>

  <main class="pb-24 md:pb-8">
    <div class="px-4 md:px-6 py-6 max-w-5xl mx-auto">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
          <h1 class="text-2xl font-bold text-slate-900 tracking-tight">E-Prescriptions</h1>
          <p class="text-sm text-slate-500 mt-0.5">Real-time feed from your care team</p>
        </div>
        <button class="emr-btn-primary w-full sm:w-auto min-h-[44px] active:scale-95">
          <i class="fas fa-redo"></i> Request Refill
        </button>
      </div>

      <!-- Dynamic Prescription Feed -->
      <div class="space-y-4" id="prescriptionFeed">
        <!-- Populated by emr-core.js -->
        <div class="emr-card p-6 text-center text-slate-500" id="prescriptionLoading">
          <i class="fas fa-spinner fa-spin text-2xl text-teal-600 mb-3"></i>
          <p>Loading prescriptions…</p>
        </div>
      </div>

      <!-- Fallback static items (shown when no dynamic data) -->
      <div id="prescriptionFallback" class="hidden space-y-4">
        <div class="emr-card p-5 border border-slate-200/80">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-2 flex-wrap mb-2">
                <span class="emr-badge emr-badge--verified"><i class="fas fa-shield-check text-[10px]"></i> Verified</span>
                <span class="emr-badge emr-badge--ready">Ready for Pickup</span>
              </div>
              <h3 class="font-semibold text-slate-900">Lisinopril 10mg</h3>
              <p class="text-sm text-slate-500 mt-0.5">Once daily • Dr. James Smith • Dec 10, 2024</p>
              <p class="text-xs text-slate-500 mt-1">Refill due: Mar 10, 2025</p>
            </div>
            <a href="billing.html?invoice=INV-2025-001" class="emr-btn-outline shrink-0 min-h-[44px] active:scale-95">
              <i class="fas fa-receipt"></i> View Bill
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Tab Bar (mobile) -->
  <nav class="emr-bottom-nav md:hidden">
    <a href="../admin-portal/emr-patient-dashboard.html"><i class="fas fa-home"></i> Home</a>
    <a href="prescriptions.html" class="active"><i class="fas fa-prescription-bottle"></i> Rx</a>
    <a href="appointments.html"><i class="fas fa-calendar-check"></i> Appts</a>
    <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
    <a href="billing.html"><i class="fas fa-receipt"></i> Billing</a>
  </nav>
    </div>
  </div>

  <script src="/js/sidebar-universal.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () { if (window.loadSidebar) loadSidebar('patient'); });
  </script>
  <script type="module">
    import {
      getPatientSession,
      getPrescriptionsForPatient,
      getPharmacyStatus,
      getBillForPrescription,
      subscribeToPrescriptions,
      escapeHtml,
      formatDate,
    } from '../js/emr-core.js';

    const feed = document.getElementById('prescriptionFeed');
    const loading = document.getElementById('prescriptionLoading');
    const fallback = document.getElementById('prescriptionFallback');

    function renderPrescriptions(prescriptions) {
      loading?.remove();

      if (!prescriptions || prescriptions.length === 0) {
        fallback?.classList.remove('hidden');
        return;
      }

      fallback?.classList.add('hidden');
      feed.innerHTML = prescriptions.map((rx) => {
        const status = getPharmacyStatus(rx.status);
        const bill = getBillForPrescription(rx.id);
        const lines = (rx.lines || []).map((l) => `${escapeHtml(l.medication)} × ${l.qty}`).join(', ');
        const billLink = bill ? `billing.html?bill=${escapeHtml(bill.id)}` : '#';

        return `
          <div class="emr-card p-5 border border-slate-200/80">
            <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 flex-wrap mb-2">
                  <span class="emr-badge emr-badge--verified"><i class="fas fa-shield-check text-[10px]"></i> Verified</span>
                  <span class="emr-badge emr-badge--${status.variant}">${escapeHtml(status.label)}</span>
                </div>
                <h3 class="font-semibold text-slate-900">${lines || 'Prescription'}</h3>
                <p class="text-sm text-slate-500 mt-0.5">${rx.diagnosis ? escapeHtml(rx.diagnosis) + ' • ' : ''}${formatDate(rx.createdAt)}</p>
              </div>
              ${bill ? `<a href="${billLink}" class="emr-btn-outline shrink-0 min-h-[44px] active:scale-95"><i class="fas fa-receipt"></i> View Bill</a>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    subscribeToPrescriptions(renderPrescriptions);
  </script>
</body>
</html>
